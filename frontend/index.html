<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>贪吃蛇游戏 - Vite + TypeScript</title>
  <link rel="stylesheet" href="./src/style.css">
</head>
<body>
  <div class="container">
    <h1>贪吃蛇游戏</h1>

    <!-- 控制面板 -->
    <div class="control-panel">
      <div class="control-group">
        <label for="map-size">地图尺寸 (10-20):</label>
        <input type="number" id="map-size" min="10" max="20" value="10">
        <span id="map-size-display">10 x 10</span>
      </div>

      <div class="control-group">
        <label>游戏模式:</label>
        <div class="mode-buttons">
          <button id="human-mode" class="mode-btn">人类模式</button>
          <button id="ai-mode" class="mode-btn active">AI模式</button>
        </div>
      </div>

      <div class="control-group">
        <label for="speed">游戏速度:</label>
        <input type="range" id="speed" min="1" max="10" value="10">
        <span id="speed-display">10</span>
      </div>

      <div class="control-group">
        <button id="start-btn" class="btn primary">开始游戏</button>
        <button id="pause-btn" class="btn secondary" disabled>暂停</button>
        <button id="reset-btn" class="btn secondary">重置</button>
      </div>
    </div>

    <!-- 游戏信息 -->
    <div class="game-info">
      <div class="info-item">
        <span class="label">状态:</span>
        <span id="game-status" class="value">未开始</span>
      </div>
      <div class="info-item">
        <span class="label">分数:</span>
        <span id="score" class="value">0</span>
      </div>
      <div class="info-item">
        <span class="label">步数:</span>
        <span id="steps" class="value">0</span>
      </div>
      <div class="info-item">
        <span class="label">AI决策:</span>
        <span id="ai-status" class="value">-</span>
      </div>
    </div>

    <!-- 游戏画布容器 -->
    <div class="game-container">
      <canvas id="game-canvas"></canvas>
    </div>

    <!-- 游戏说明 -->
    <div class="instructions">
      <h3>游戏说明</h3>
      <ul>
        <li><strong>人类模式:</strong> 使用方向键 (↑ ↓ ← →) 控制蛇的移动</li>
        <li><strong>AI模式:</strong> AI自动控制蛇寻找食物，目标是吃满整个地图</li>
        <li><strong>地图调整:</strong> 在10x10到20x20范围内调整地图大小</li>
        <li><strong>暂停:</strong> 空格键或暂停按钮暂停/继续游戏</li>
      </ul>
    </div>
  </div>

  <script type="module" src="./src/main.ts"></script>
</body>
</html>
